<svg width="260" height="260" viewBox="0 0 260 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Rotating visual systems sigil</title>
  <desc id="desc">An abstract animated wireframe symbol representing automation, deep learning, visual systems, and human AI interfaces.</desc>

  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9d1d9" stop-opacity="0.95"/>
      <stop offset="48%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="line" x1="30" y1="40" x2="230" y2="220">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#a371f7"/>
      <stop offset="100%" stop-color="#79c0ff"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="260" height="260" rx="26" fill="#0d1117"/>

  <circle cx="130" cy="130" r="82" fill="url(#core)" opacity="0.18">
    <animate attributeName="opacity" values="0.10;0.22;0.10" dur="5s" repeatCount="indefinite"/>
  </circle>

  <g opacity="0.35" stroke="#30363d" stroke-width="1">
    <path d="M34 130H226"/>
    <path d="M130 34V226"/>
    <circle cx="130" cy="130" r="88"/>
    <circle cx="130" cy="130" r="54"/>
  </g>

  <g filter="url(#glow)">
    <g stroke="url(#line)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <animateTransform attributeName="transform" type="rotate" from="0 130 130" to="360 130 130" dur="11s" repeatCount="indefinite"/>
      <ellipse cx="130" cy="130" rx="78" ry="28"/>
      <ellipse cx="130" cy="130" rx="78" ry="28" transform="rotate(60 130 130)"/>
      <ellipse cx="130" cy="130" rx="78" ry="28" transform="rotate(120 130 130)"/>
      <path d="M130 52L197 91V169L130 208L63 169V91L130 52Z" opacity="0.75"/>
      <path d="M130 78L174 104V156L130 182L86 156V104L130 78Z" opacity="0.55"/>
      <path d="M63 91L174 156" opacity="0.35"/>
      <path d="M197 91L86 156" opacity="0.35"/>
      <path d="M130 52V208" opacity="0.25"/>
    </g>

    <g fill="#c9d1d9">
      <circle cx="130" cy="52" r="3"/>
      <circle cx="197" cy="91" r="3"/>
      <circle cx="197" cy="169" r="3"/>
      <circle cx="130" cy="208" r="3"/>
      <circle cx="63" cy="169" r="3"/>
      <circle cx="63" cy="91" r="3"/>
      <animateTransform attributeName="transform" type="rotate" from="0 130 130" to="360 130 130" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;1;0.45" dur="4s" repeatCount="indefinite"/>
    </g>
  </g>

  <g opacity="0.55" stroke="#8b949e" stroke-width="1.2" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="360 130 130" to="0 130 130" dur="18s" repeatCount="indefinite"/>
    <path d="M130 30C184 30 228 74 228 128"/>
    <path d="M130 230C76 230 32 186 32 132"/>
  </g>
</svg>
