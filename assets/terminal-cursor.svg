<svg width="192" height="160" viewBox="0 0 192 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated terminal cursor object</title>
  <desc id="desc">A compact dark terminal window with a subtle animated wireframe cursor object.</desc>

  <defs>
    <linearGradient id="surface" x1="20" y1="22" x2="172" y2="138" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="edge" x1="32" y1="44" x2="150" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b949e"/>
      <stop offset="0.48" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#7ee787"/>
    </linearGradient>
    <clipPath id="terminal">
      <rect x="18" y="20" width="156" height="120" rx="10"/>
    </clipPath>
  </defs>

  <rect x="18" y="20" width="156" height="120" rx="10" fill="url(#surface)" stroke="#30363d"/>
  <path d="M18 45H174" stroke="#30363d"/>

  <g fill="#30363d">
    <circle cx="34" cy="33" r="3"/>
    <circle cx="46" cy="33" r="3"/>
    <circle cx="58" cy="33" r="3"/>
  </g>

  <g clip-path="url(#terminal)">
    <g opacity="0.22" stroke="#8b949e" stroke-width="0.7">
      <path d="M35 56H159"/>
      <path d="M35 74H159"/>
      <path d="M35 92H159"/>
      <path d="M35 110H159"/>
      <path d="M48 50V124"/>
      <path d="M72 50V124"/>
      <path d="M96 50V124"/>
      <path d="M120 50V124"/>
      <path d="M144 50V124"/>
    </g>

    <text x="34" y="63" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="10" letter-spacing="0">~/interface</text>
    <path d="M34 78H74" stroke="#8b949e" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
    <path d="M34 94H62" stroke="#8b949e" stroke-width="2" stroke-linecap="round" opacity="0.28"/>

    <g>
      <animateTransform attributeName="transform" type="rotate" values="-3 111 89;3 111 89;-3 111 89" dur="8s" repeatCount="indefinite"/>
      <path d="M91 76H125V105H91V76Z" stroke="url(#edge)" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M103 64H137V93H103V64Z" stroke="url(#edge)" stroke-width="1.5" stroke-linejoin="round" opacity="0.72"/>
      <path d="M91 76L103 64" stroke="url(#edge)" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M125 76L137 64" stroke="url(#edge)" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M125 105L137 93" stroke="url(#edge)" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M91 105L103 93" stroke="url(#edge)" stroke-width="1.5" stroke-linecap="round"/>

      <rect x="97" y="82" width="9" height="15" rx="1.5" fill="#f0f6fc">
        <animate attributeName="x" values="97;109;121;121;109;97" dur="6.8s" repeatCount="indefinite"/>
        <animate attributeName="y" values="82;82;82;94;94;82" dur="6.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.95;0.28;0.95" dur="1.35s" repeatCount="indefinite"/>
      </rect>
    </g>

    <path d="M34 120H82" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" opacity="0.34">
      <animate attributeName="opacity" values="0.16;0.44;0.16" dur="4.6s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
